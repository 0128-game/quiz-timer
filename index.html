<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クイズ用タイマー＆ストップウォッチ</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .main-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 350px;
        }
        .display {
            font-size: 5rem;
            font-weight: bold;
            margin: 20px 0;
            color: #333;
            font-variant-numeric: tabular-nums;
            height: 1.2em;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #sw-display {
            font-size: 3.5rem;
            color: #007bff;
        }
        .button-grid {
            display: grid;
            gap: 10px;
        }
        /* タイマー用：3列×2段 + ワイドな停止ボタン */
        .timer-grid {
            grid-template-columns: repeat(3, 1fr);
        }
        /* ストップウォッチ用：2列 */
        .sw-grid {
            grid-template-columns: repeat(2, 1fr);
        }
        button {
            padding: 12px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background-color: #007bff;
            color: white;
            transition: transform 0.1s, background-color 0.2s;
        }
        button:hover { background-color: #0056b3; }
        button:active { transform: scale(0.95); }
        
        .stop-btn { background-color: #dc3545; grid-column: span 3; }
        .sw-start { background-color: #28a745; }
        .sw-stop { background-color: #fd7e14; }
        .sw-reset { background-color: #6c757d; grid-column: span 2; }

        .time-up {
            color: #dc3545 !important;
            animation: blink 0.5s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="container">
        <h2>Timer</h2>
        <div id="display" class="display">00</div>
        <div class="button-grid timer-grid">
            <button onclick="startTimer(10)">10s</button>
            <button onclick="startTimer(20)">20s</button>
            <button onclick="startTimer(30)">30s</button>
            <button onclick="startTimer(40)">40s</button>
            <button onclick="startTimer(50)">50s</button>
            <button onclick="startTimer(60)">60s</button>
            <button class="stop-btn" onclick="stopTimer()">タイマー停止/リセット</button>
        </div>
    </div>

    <div class="container">
        <h2>Stopwatch</h2>
        <div id="sw-display" class="display">00:00.00</div>
        <div class="button-grid sw-grid">
            <button class="sw-start" onclick="startSW()">スタート</button>
            <button class="sw-stop" onclick="stopSW()">ストップ</button>
            <button class="sw-reset" onclick="resetSW()">リセット</button>
        </div>
    </div>
</div>

<script>
    /* --- タイマー --- */
    let timerInterval;
    const timerDisplay = document.getElementById('display');

    function startTimer(seconds) {
        clearInterval(timerInterval);
        timerDisplay.classList.remove('time-up');
        let timeLeft = seconds;
        updateTimerDisplay(timeLeft);
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerDisplay(timeLeft);
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                timerDisplay.classList.add('time-up');
            }
        }, 1000);
    }

    function stopTimer() {
        clearInterval(timerInterval);
        timerDisplay.classList.remove('time-up');
        timerDisplay.innerText = "00";
    }

    function updateTimerDisplay(time) {
        timerDisplay.innerText = time < 10 ? '0' + time : time;
    }

    /* --- ストップウォッチ --- */
    let swInterval;
    let startTime;
    let elapsedTime = 0;
    const swDisplay = document.getElementById('sw-display');

    function startSW() {
        if (swInterval) return;
        startTime = Date.now() - elapsedTime;
        swInterval = setInterval(updateSW, 10);
    }

    function stopSW() {
        clearInterval(swInterval);
        swInterval = null;
    }

    function resetSW() {
        stopSW();
        elapsedTime = 0;
        swDisplay.innerText = "00:00.00";
    }

    function updateSW() {
        elapsedTime = Date.now() - startTime;
        const totalSeconds = Math.floor(elapsedTime / 1000);
        const m = Math.floor(totalSeconds / 60);
        const s = totalSeconds % 60;
        const mStr = m.toString().padStart(2, '0');
        const sStr = s.toString().padStart(2, '0');

        if (totalSeconds < 300) { // 5分(300秒)未満はミリ秒あり
            const ms = Math.floor((elapsedTime % 1000) / 10);
            const msStr = ms.toString().padStart(2, '0');
            swDisplay.innerText = `${mStr}:${sStr}.${msStr}`;
        } else { // 5分以上は1秒刻み
            swDisplay.innerText = `${mStr}:${sStr}`;
        }
    }
</script>

</body>
</html>
